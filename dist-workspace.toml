[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = false
# We rename the workflow `name:` field from the cargo-dist default ("Release")
# to "CLI Release" so it's distinguishable from `Node CI` / `Python CI` in the
# GitHub Actions UI. cargo-dist regenerates the file and would otherwise revert
# that rename, so `allow-dirty = ["ci"]` tells `dist generate --check` to skip
# diffing the workflow file. The rest of the workflow body (jobs, matrix, etc.)
# is still owned by cargo-dist; only the top-of-file `name:` is hand-edited.
allow-dirty = ["ci"]
