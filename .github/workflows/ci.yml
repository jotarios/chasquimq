name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml pins channel = "stable" with rustfmt + clippy
      # components, so dtolnay/rust-toolchain@stable + that file picks up
      # the right toolchain automatically.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: cargo clippy
        run: cargo clippy --all-targets --workspace -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:8.6.2
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      REDIS_URL: redis://127.0.0.1:6379
      # Skip the known-flaky `dlq_peek_and_replay_preserve_name` test in CI.
      # Tracked in task #47 for proper deterministic-wait fix.
      CHASQUIMQ_SKIP_FLAKY: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      # `--include-ignored` runs both unit tests and the integration tests
      # marked `#[ignore = "requires REDIS_URL"]`. The annotation is a
      # local-dev convenience (so a contributor running `cargo test` without
      # Redis up doesn't see spurious failures); CI provides the Redis
      # service container above and must run the full suite.
      - name: cargo test
        run: cargo test --workspace -- --include-ignored
